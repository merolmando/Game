<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tierra Media - Documentación</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .docs-content {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 2rem;
      line-height: 1.7;
      overflow-wrap: break-word;
    }
    .docs-content h1 { color: #f0e6d0; font-size: 1.8rem; margin: 1.5rem 0 0.8rem; border-bottom: 1px solid #30363d; padding-bottom: 0.4rem; }
    .docs-content h2 { color: #f0e6d0; font-size: 1.4rem; margin: 1.3rem 0 0.6rem; border-bottom: 1px solid #21262d; padding-bottom: 0.3rem; }
    .docs-content h3 { color: #f0e6d0; font-size: 1.15rem; margin: 1rem 0 0.5rem; }
    .docs-content h4 { color: #c9d1d9; font-size: 1rem; margin: 0.8rem 0 0.4rem; }
    .docs-content p { margin: 0.6rem 0; color: #c9d1d9; }
    .docs-content a { color: #58a6ff; }
    .docs-content a:hover { color: #79c0ff; text-decoration: underline; }
    .docs-content strong { color: #f0e6d0; }
    .docs-content code { background: #21262d; padding: 0.15rem 0.4rem; border-radius: 4px; font-size: 0.9em; color: #f0e6d0; }
    .docs-content pre { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 1rem; overflow-x: auto; margin: 0.8rem 0; }
    .docs-content pre code { background: none; padding: 0; border-radius: 0; }
    .docs-content ul, .docs-content ol { padding-left: 1.5rem; margin: 0.5rem 0; color: #c9d1d9; }
    .docs-content li { margin: 0.3rem 0; }
    .docs-content hr { border: none; border-top: 1px solid #30363d; margin: 1.5rem 0; }
    .docs-content table { width: 100%; border-collapse: collapse; margin: 0.8rem 0; }
    .docs-content th, .docs-content td { border: 1px solid #30363d; padding: 0.5rem 0.8rem; text-align: left; }
    .docs-content th { background: #21262d; color: #f0e6d0; }
    .docs-content td { color: #c9d1d9; }
    .docs-content blockquote { border-left: 4px solid #30363d; padding-left: 1rem; color: #8b949e; margin: 0.8rem 0; }
    .docs-content img { max-width: 100%; border-radius: 6px; }
    .docs-nav { margin: 0.5rem 0 1.5rem; display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .docs-nav a { display: inline-block; padding: 0.4rem 1rem; background: #21262d; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; text-decoration: none; font-size: 0.9rem; }
    .docs-nav a:hover { background: #30363d; color: #f0e6d0; }
    .docs-nav a.active { background: #1f6feb; border-color: #1f6feb; color: #fff; }
    .loading { text-align: center; padding: 3rem; color: #8b949e; font-size: 1.1rem; }
    .error-doc { text-align: center; padding: 3rem; color: #f85149; }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="/" class="logo">Tierra Media</a>
    <ul class="nav-links">
      <li><a href="/">Inicio</a></li>
      <li><a href="/juego">Juego</a></li>
      <li><a href="/desarrollo">Desarrollo</a></li>
      <li><a href="/docs">Docs</a></li>
      <li><a href="/devlog">Devlog</a></li>
      <li><a href="/hitos">Hitos</a></li>
    </ul>
  </nav>

  <main>
    <h1>Documentación</h1>
    <nav class="docs-nav">
      <a href="/docs">General</a>
      <a href="/docs/gamecore">GameCore</a>
      <a href="/docs/gamecore/core">core.js</a>
      <a href="/docs/gamecore/input">input.js</a>
      <a href="/docs/gamecore/map">map.js</a>
      <a href="/docs/gamecore/player">player.js</a>
      <a href="/docs/gamecore/camera">camera.js</a>
      <a href="/docs/gamecore/raycaster">raycaster.js</a>
      <a href="/docs/gamecore/renderer">renderer.js</a>
      <a href="/docs/gamecore/sprite">sprite.js</a>
    </nav>
    <div id="docContainer" class="docs-content loading">Cargando documentación...</div>
  </main>

  <footer>
    <p>Proyecto Tierra Media — MMO Descentralizado</p>
  </footer>

  <script src="/js/main.js"></script>
  <script>
    (function() {
      const path = window.location.pathname;

      document.querySelectorAll('.docs-nav a').forEach(a => {
        if (a.getAttribute('href') === path) a.classList.add('active');
      });
      const DOC_PAGES = {
        '/docs/gamecore':        { file: '/js/gamecore/README.md',        title: 'GameCore — Documentación del Motor' },
        '/docs/gamecore/core':   { file: '/js/gamecore/docs/core.md',     title: 'GameCore — core.js' },
        '/docs/gamecore/input':  { file: '/js/gamecore/docs/input.md',    title: 'GameCore — input.js' },
        '/docs/gamecore/map':    { file: '/js/gamecore/docs/map.md',      title: 'GameCore — map.js' },
        '/docs/gamecore/player': { file: '/js/gamecore/docs/player.md',   title: 'GameCore — player.js' },
        '/docs/gamecore/camera': { file: '/js/gamecore/docs/camera.md',   title: 'GameCore — camera.js' },
        '/docs/gamecore/raycaster': { file: '/js/gamecore/docs/raycaster.md', title: 'GameCore — raycaster.js' },
        '/docs/gamecore/renderer':  { file: '/js/gamecore/docs/renderer.md',  title: 'GameCore — renderer.js' },
        '/docs/gamecore/sprite':    { file: '/js/gamecore/docs/sprite.md',    title: 'GameCore — sprite.js' },
      };

      const doc = DOC_PAGES[path] || { file: '/README.md', title: 'Proyecto Tierra Media — Documentación General' };
      let mdFile = doc.file;
      let title = doc.title;

      document.querySelector('h1').textContent = title;

      const container = document.getElementById('docContainer');

      fetch(mdFile)
        .then(res => {
          if (!res.ok) throw new Error('No se pudo cargar ' + mdFile);
          return res.text();
        })
        .then(md => {
          container.className = 'docs-content';
          container.innerHTML = renderMarkdown(md);
        })
        .catch(err => {
          container.className = 'error-doc';
          container.innerHTML = '<h2>Error</h2><p>' + err.message + '</p>';
        });

      function escapeHtml(text) {
        return text
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
      }

      function renderMarkdown(md) {
        const lines = md.split('\n');
        let html = '';
        let i = 0;
        let inCodeBlock = false;
        let codeBuffer = [];
        let codeLang = '';
        let inTable = false;
        let tableBuffer = [];
        let inList = false;
        let listType = '';
        let listBuffer = [];

        while (i < lines.length) {
          const line = lines[i];

          // Code block detection
          if (/^```/.test(line)) {
            if (inCodeBlock) {
              html += '<pre><code' + (codeLang ? ' class="language-' + codeLang + '"' : '') + '>' + escapeHtml(codeBuffer.join('\n')) + '</code></pre>\n';
              codeBuffer = [];
              codeLang = '';
              inCodeBlock = false;
              i++;
              continue;
            } else {
              inCodeBlock = true;
              codeLang = line.slice(3).trim();
              i++;
              continue;
            }
          }

          if (inCodeBlock) {
            codeBuffer.push(line);
            i++;
            continue;
          }

          // Flush table
          if (inTable && !/^\|/.test(line)) {
            html += renderTable(tableBuffer);
            tableBuffer = [];
            inTable = false;
          }

          // Flush list
          if (inList && !/^(\s*[-*+]\s|\s*\d+\.\s)/.test(line) && line.trim() !== '') {
            html += renderList(listType, listBuffer);
            listBuffer = [];
            inList = false;
            listType = '';
          }

          // Empty line: flush paragraph if not in list
          if (line.trim() === '') {
            if (inList) {
              listBuffer.push({ type: 'gap' });
            }
            i++;
            continue;
          }

          // HR
          if (/^---+\s*$/.test(line)) {
            html += '<hr>\n';
            i++;
            continue;
          }

          // Headers
          const hMatch = line.match(/^(#{1,6})\s+(.+)$/);
          if (hMatch) {
            html += '<h' + hMatch[1].length + '>' + renderInline(hMatch[2]) + '</h' + hMatch[1].length + '>\n';
            i++;
            continue;
          }

          // Tables
          if (/^\|.+\|$/.test(line)) {
            inTable = true;
            tableBuffer.push(line);
            i++;
            continue;
          }

          // Unordered list
          const ulMatch = line.match(/^(\s*)[-*+]\s+(.+)$/);
          if (ulMatch) {
            if (!inList) { inList = true; listType = 'ul'; }
            listBuffer.push({ type: 'item', text: ulMatch[2], indent: ulMatch[1].length });
            i++;
            continue;
          }

          // Ordered list
          const olMatch = line.match(/^(\s*)\d+\.\s+(.+)$/);
          if (olMatch) {
            if (!inList) { inList = true; listType = 'ol'; }
            listBuffer.push({ type: 'item', text: olMatch[2], indent: olMatch[1].length });
            i++;
            continue;
          }

          // Blockquote
          if (/^>\s/.test(line)) {
            html += '<blockquote>' + renderInline(line.replace(/^>\s?/, '')) + '</blockquote>\n';
            i++;
            continue;
          }

          // Regular paragraph
          let para = '';
          while (i < lines.length && lines[i].trim() !== '' && !/^#{1,6}\s/.test(lines[i]) && !/^---+\s*$/.test(lines[i]) && !/^\|.+\|$/.test(lines[i]) && !/^```/.test(lines[i]) && !/^(\s*)[-*+]\s/.test(lines[i]) && !/^(\s*)\d+\.\s/.test(lines[i])) {
            para += (para ? ' ' : '') + lines[i].trim();
            i++;
          }
          if (para) {
            html += '<p>' + renderInline(para) + '</p>\n';
          }
        }

        // Flush remaining
        if (inCodeBlock) {
          html += '<pre><code>' + escapeHtml(codeBuffer.join('\n')) + '</code></pre>\n';
        }
        if (inTable) {
          html += renderTable(tableBuffer);
        }
        if (inList) {
          html += renderList(listType, listBuffer);
        }

        return html;
      }

      function renderInline(text) {
        text = escapeHtml(text);

        // Images: ![alt](url)
        text = text.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" loading="lazy">');
        // Links: [text](url)
        text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
        // Bold+italic: ***text***
        text = text.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
        // Bold: **text**
        text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        // Italic: *text*
        text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
        // Inline code: `text`
        text = text.replace(/`([^`]+)`/g, '<code>$1</code>');

        return text;
      }

      function renderTable(rows) {
        let html = '<table>\n';
        for (let r = 0; r < rows.length; r++) {
          const cells = rows[r].split('|').filter(c => c.trim() !== '');
          // Skip separator rows
          if (cells.length > 0 && /^[-:\s]+$/.test(cells[0].trim())) continue;
          const tag = r === 0 ? 'th' : 'td';
          html += '  <tr>';
          for (const cell of cells) {
            html += '<' + tag + '>' + renderInline(cell.trim()) + '</' + tag + '>';
          }
          html += '</tr>\n';
        }
        html += '</table>\n';
        return html;
      }

      function renderList(type, items) {
        let html = '<' + type + '>\n';
        for (const item of items) {
          if (item.type === 'gap') {
            html += '</' + type + '>\n<' + type + '>\n';
          } else {
            html += '  <li>' + renderInline(item.text) + '</li>\n';
          }
        }
        html += '</' + type + '>\n';
        return html;
      }
    })();
  </script>
</body>
</html>
