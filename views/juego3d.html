<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tierra Media - Juego 3D</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    * { margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas { display: block; width: 100%; height: 100%; }
    #blocker {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; z-index: 10; cursor: pointer;
    }
    #blocker .title { color: #c8a45c; font-size: 2rem; margin-bottom: 1rem; font-weight: bold; }
    #blocker .hint { color: #ccc; font-size: 1.2rem; }
    #blocker .controls { color: #888; font-size: 0.9rem; margin-top: 2rem; text-align: center; line-height: 1.6; }
    #hud {
      position: fixed; top: 10px; left: 10px; color: #fff;
      font-family: monospace; font-size: 14px; z-index: 5;
      pointer-events: none; text-shadow: 1px 1px 2px #000;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <div id="blocker">
    <div class="title">Tierra Media — 3D</div>
    <div class="hint">Click para jugar</div>
    <div class="controls">
      WASD &nbsp;—&nbsp; Moverse<br>
      Mouse &nbsp;—&nbsp; Mirar<br>
      Q/E &nbsp;—&nbsp; Strafear<br><br>
      <a href="/" style="color:#888;font-size:0.8rem">Volver al inicio</a>
    </div>
  </div>
  <div id="hud">
    <div id="hud-fps">FPS: --</div>
    <div id="hud-pos">Pos: --</div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="/js/gamecore/input.js"></script>
  <script src="/js/gamecore/map.js"></script>
  <script src="/js/gamecore/player.js"></script>
  <script src="/js/gamecore/sprite.js"></script>
  <script src="/js/gamecore/three/three-scene.js"></script>
  <script src="/js/gamecore/three/chunk.js"></script>
  <script src="/js/gamecore/three/three-sprites.js"></script>
  <script src="/js/gamecore/three/three-core.js"></script>
</body>
</html>
