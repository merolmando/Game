<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tierra Media - Juego 3D</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    * { margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas { display: block; width: 100%; height: 100%; }
    #blocker {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; z-index: 10; cursor: pointer;
    }
    #blocker .title { color: #c8a45c; font-size: 2rem; margin-bottom: 1rem; font-weight: bold; }
    #blocker .hint { color: #ccc; font-size: 1.2rem; }
    #blocker .controls { color: #888; font-size: 0.9rem; margin-top: 2rem; text-align: center; line-height: 1.6; }
    #hud {
      position: fixed; top: 10px; left: 10px; color: #fff;
      font-family: monospace; font-size: 14px; z-index: 5;
      pointer-events: none; text-shadow: 1px 1px 2px #000;
    }
    #fadeOverlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #000; z-index: 100; pointer-events: none;
      opacity: 0; transition: opacity 0.3s ease;
    }
    #fadeOverlay.active { opacity: 1; }
    #crosshair {
      position: fixed; top: 50%; left: 50%; z-index: 6;
      pointer-events: none; transform: translate(-50%, -50%);
      color: rgba(255,255,255,0.5); font-size: 24px;
      font-family: monospace;
    }
    #hud-fps, #hud-pos { margin-bottom: 4px; }
    #hud-level { color: #c8a45c; margin-bottom: 6px; font-size: 13px; }
    .stat-row { display: flex; align-items: center; margin-bottom: 3px; font-size: 12px; }
    .stat-label { width: 28px; color: #aaa; }
    .stat-bar { flex: 1; height: 10px; background: #222; border: 1px solid #444; border-radius: 2px; overflow: hidden; margin: 0 6px; }
    .stat-fill { height: 100%; transition: width 0.2s ease; }
    .stat-fill.hp { background: #f85149; }
    .stat-fill.mp { background: #58a6ff; }
    .stat-text { color: #ccc; font-size: 11px; min-width: 45px; text-align: right; }
    #exit-prompt {
      position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
      z-index: 6; pointer-events: none;
      background: rgba(0,0,0,0.6); color: #ffd700;
      padding: 8px 16px; border-radius: 4px;
      font-family: monospace; font-size: 14px;
      border: 1px solid rgba(255,215,0,0.3);
      display: none;
    }
    #map-name {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      z-index: 7; pointer-events: none;
      color: #c8a45c; font-size: 1.5rem;
      font-family: monospace; text-shadow: 2px 2px 4px #000;
      opacity: 0; transition: opacity 0.5s ease;
    }
    #map-name.show { opacity: 1; }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <div id="fadeOverlay"></div>
  <div id="crosshair">+</div>
  <div id="map-name"></div>
  <div id="exit-prompt"></div>
  <div id="blocker">
    <div class="title">Tierra Media — 3D</div>
    <div class="hint">Click para jugar</div>
    <div class="controls">
      WASD &nbsp;—&nbsp; Moverse<br>
      Mouse &nbsp;—&nbsp; Mirar<br>
      Q/E &nbsp;—&nbsp; Strafear<br><br>
      <a href="/" style="color:#888;font-size:0.8rem">Volver al inicio</a>
    </div>
  </div>
  <div id="hud">
    <div id="hud-fps">FPS: --</div>
    <div id="hud-pos">Pos: --</div>
    <div id="hud-level"></div>
    <div class="stat-row">
      <span class="stat-label">HP</span>
      <div class="stat-bar"><div id="hp-fill" class="stat-fill hp" style="width:100%"></div></div>
      <span id="hp-text" class="stat-text">100/100</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">MP</span>
      <div class="stat-bar"><div id="mp-fill" class="stat-fill mp" style="width:100%"></div></div>
      <span id="mp-text" class="stat-text">50/50</span>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="/js/gamecore/input.js"></script>
  <script src="/js/gamecore/map.js"></script>
  <script src="/js/gamecore/player.js"></script>
  <script src="/js/gamecore/sprite.js"></script>
  <script src="/js/gamecore/three/three-scene.js"></script>
  <script src="/js/gamecore/three/chunk.js"></script>
  <script src="/js/gamecore/three/three-sprites.js"></script>
  <script src="/js/gamecore/three/three-core.js"></script>
</body>
</html>
