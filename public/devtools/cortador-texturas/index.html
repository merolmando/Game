<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tierra Media - Cortador de Texturas</title>
  <link rel="stylesheet" href="/devtools/devtools-base.css">
  <link rel="stylesheet" href="/devtools/devtools.css">
  <link rel="stylesheet" href="/devtools/cortador-texturas/style.css">
</head>
<body class="tool-body">
  <div class="tool-container">

    <header class="tool-header">
      <a href="/desarrollo/herramientas" class="tool-back">← Herramientas</a>
      <h1>Cortador de Texturas</h1>
      <div class="tool-actions">
        <span id="saveStatus" class="save-status"></span>
        <button id="btnGuardarTodo" class="tool-btn" disabled>Guardar Todo</button>
      </div>
    </header>

    <div class="toolbar">
      <div class="toolbar-group">
        <button id="zoomOut" class="tool-btn-sm">−</button>
        <span id="zoomLabel" class="toolbar-value">100%</span>
        <button id="zoomIn" class="tool-btn-sm">+</button>
        <button id="zoomFit" class="tool-btn-sm">Ajustar</button>
      </div>
      <div class="toolbar-group">
        <label>Snap</label>
        <input type="checkbox" id="chkSnap" checked>
        <label>Grilla</label>
        <input type="checkbox" id="chkGrid" checked>
        <label>Tile</label>
        <input type="number" id="gridSize" value="32" min="4" max="256" class="size-input" style="width:55px">
      </div>
    </div>

    <div class="tool-main">

      <aside class="panel-left">
        <section class="tool-section">
          <h3>Imagen</h3>
          <div id="dropZone" class="drop-zone">
            <p>Arrastrá una imagen</p>
            <button id="uploadBtn" class="tool-btn-sm">Seleccionar archivo</button>
            <input type="file" id="fileInput" accept="image/png,image/jpeg,image/gif,image/webp" hidden>
          </div>
          <div id="imageInfo" class="image-info" hidden></div>
        </section>

        <section class="tool-section">
          <h3>Entidades</h3>
          <div id="entityList" class="entity-list">
            <p class="muted">Cargando...</p>
          </div>
        </section>
      </aside>

      <section class="panel-center">
        <div id="canvasWrapper" class="canvas-wrapper">
          <canvas id="spriteCanvas"></canvas>
          <div id="emptyState" class="empty-state">
            <p>Subí un spritesheet para empezar</p>
          </div>
        </div>
        <div id="coordStatus" class="coord-status"></div>
      </section>

      <aside class="panel-right">
        <section class="tool-section">
          <h3>Selecciones <span id="selCount" class="sel-count">(0)</span></h3>
          <div id="selectionsList" class="selections-list"></div>
        </section>

        <section class="tool-section" id="propSection">
          <h3>Propiedades</h3>
          <div id="noSelectionMsg" class="muted" style="text-align:center;padding:0.5rem">
            Seleccioná un área en la imagen
          </div>
          <div id="propForm" hidden>
            <div class="prop-field">
              <label>Nombre (ID único)</label>
              <input type="text" id="propName" class="prop-input" placeholder="ej: arbol">
            </div>
            <div class="prop-row">
              <span class="prop-label">Posición</span>
              <span id="propPos" class="prop-value">—</span>
            </div>
            <div class="prop-row">
              <span class="prop-label">Tamaño</span>
              <span id="propSize" class="prop-value">—</span>
            </div>
            <div class="prop-field">
              <label>Tipo</label>
              <select id="propType" class="prop-select">
                <option value="tile">Tile</option>
                <option value="character">Personaje</option>
              </select>
            </div>
            <div class="prop-field">
              <label>Atlas</label>
              <select id="propAtlas" class="prop-select">
                <option value="mundo">Mundo</option>
                <option value="entidades">Entidades</option>
                <option value="ui">UI</option>
                <option value="efectos">Efectos</option>
              </select>
            </div>
            <div class="prop-field">
              <label><input type="checkbox" id="propSolid"> Sólido</label>
            </div>
            <div class="prop-field">
              <label>Tamaño tile (px)</label>
              <input type="number" id="propTileSize" value="32" min="4" max="256" class="prop-input">
            </div>
            <div class="prop-field-row">
              <div class="prop-field" style="flex:1">
                <label>Tile Ancho</label>
                <input type="number" id="propTileW" value="1" min="1" max="8" class="prop-input">
              </div>
              <div class="prop-field" style="flex:1">
                <label>Tile Alto</label>
                <input type="number" id="propTileH" value="1" min="1" max="8" class="prop-input">
              </div>
            </div>
            <div class="prop-field">
              <label>Direcciones</label>
              <select id="propDirections" class="prop-select">
                <option value="none">Ninguna</option>
                <option value="4dir">4 direcciones</option>
                <option value="8dir">8 direcciones</option>
              </select>
            </div>
            <div class="prop-field-row">
              <div class="prop-field" style="flex:1">
                <label><input type="checkbox" id="propMirror" checked> Espejar</label>
              </div>
              <div class="prop-field" style="flex:1">
                <label><input type="checkbox" id="propHalfBlock"> Medio bloque</label>
              </div>
            </div>
            <div class="prop-field-row">
              <div class="prop-field" style="flex:1">
                <label><input type="checkbox" id="propBlockVision"> Bloquea visión</label>
              </div>
              <div class="prop-field" style="flex:1">
                <label><input type="checkbox" id="propHalfSolid"> Media sólido</label>
              </div>
            </div>
            <div class="prop-field">
              <label>Frames <span id="framesAuto" class="frames-auto">(automático)</span></label>
              <input type="number" id="propFrames" value="1" min="1" max="64" class="prop-input">
            </div>
            <div class="prop-field">
              <label>Vel. Animación</label>
              <input type="number" id="propAnimSpeed" value="0" min="0" max="10" step="0.05" class="prop-input">
            </div>
            <div class="prop-actions">
              <button id="btnGuardarSel" class="tool-btn primary" disabled>Guardar</button>
              <button id="btnDeleteSel" class="tool-btn" disabled>Eliminar</button>
            </div>
          </div>
        </section>

        <section class="tool-section">
          <h3>Preview</h3>
          <div class="preview-container">
            <canvas id="previewCanvas"></canvas>
          </div>
          <p id="previewSize" class="preview-size">—</p>
        </section>
      </aside>

    </div>

    <div id="modalOverlay" class="modal-overlay" style="display:none">
      <div class="modal">
        <h2 id="modalTitle">Confirmar</h2>
        <div id="modalBody"></div>
        <div class="modal-actions">
          <button id="modalCancel" class="tool-btn">Cancelar</button>
          <button id="modalOk" class="tool-btn primary">Aceptar</button>
        </div>
      </div>
    </div>

  </div>
  <script src="/devtools/cortador-texturas/script.js"></script>
</body>
</html>
