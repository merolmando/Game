<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tierra Media - Editor HUD</title>
  <link rel="stylesheet" href="/devtools/devtools-base.css">
  <link rel="stylesheet" href="/devtools/devtools.css">
  <link rel="stylesheet" href="/devtools/editor-hud/style.css">
</head>
<body class="tool-body">
  <div class="tool-container">

    <header class="tool-header">
      <a href="/desarrollo/herramientas" class="tool-back">← Herramientas</a>
      <h1>Editor HUD</h1>
      <div class="tool-actions">
        <span id="saveStatus" class="save-status"></span>
        <button id="btnNuevo" class="tool-btn">Nuevo</button>
        <button id="btnAbrir" class="tool-btn">Abrir</button>
        <button id="btnGuardar" class="tool-btn primary">Guardar</button>
        <button id="btnExport" class="tool-btn">Exportar JSON</button>
      </div>
    </header>

    <div class="toolbar">
      <div class="toolbar-group">
        <label>Zoom:</label>
        <button id="zoomOut" class="tool-btn-sm">−</button>
        <span id="zoomLabel" class="toolbar-value">100%</span>
        <button id="zoomIn" class="tool-btn-sm">+</button>
      </div>
      <div class="toolbar-group">
        <label><input type="checkbox" id="chkGrid" checked> Grid</label>
      </div>
      <div class="toolbar-group">
        <label>Vista:</label>
        <select id="selVista">
          <option value="640x480">640×480</option>
          <option value="800x600">800×600</option>
          <option value="1024x768">1024×768</option>
        </select>
      </div>
      <div class="toolbar-group">
        <span id="hudNameLabel" style="color:#8b949e">—</span>
      </div>
      <div class="toolbar-group" id="deleteGroup" style="display:none">
        <button id="btnEliminar" class="tool-btn-sm" style="color:#f85149;border-color:#f85149">Eliminar</button>
      </div>
    </div>

    <div class="tool-main">

      <aside class="panel-left">
        <h3>Elementos</h3>
        <div id="elementPalette" class="element-palette">
          <button class="palette-element" data-type="bar">
            <span class="palette-icon">▬</span>
            <span>Barra</span>
          </button>
          <button class="palette-element" data-type="text">
            <span class="palette-icon">T</span>
            <span>Texto</span>
          </button>
          <button class="palette-element" data-type="minimap">
            <span class="palette-icon">◈</span>
            <span>Minimapa</span>
          </button>
          <button class="palette-element" data-type="inventory-slot">
            <span class="palette-icon">▢</span>
            <span>Slot Inv.</span>
          </button>
          <button class="palette-element" data-type="image">
            <span class="palette-icon">◆</span>
            <span>Imagen</span>
          </button>
          <button class="palette-element" data-type="message-log">
            <span class="palette-icon">☰</span>
            <span>Mensajes</span>
          </button>
        </div>
        <hr>
        <h3>Lista</h3>
        <div id="elementList" class="element-list">
          <p class="muted">Sin elementos</p>
        </div>
      </aside>

      <section class="panel-center">
        <div class="hud-canvas-wrapper">
          <canvas id="hudCanvas"></canvas>
          <div id="hudRulers" class="hud-rulers">
            <span id="rulerInfo">Arrastra elementos desde la paleta</span>
          </div>
        </div>
      </section>

      <aside class="panel-right">
        <h3>Propiedades</h3>
        <div id="propContent">
          <p class="muted">Selecciona un elemento en el canvas o en la lista</p>
        </div>
        <hr>
        <div id="elementActions" style="display:none">
          <button id="btnDuplicate" class="tool-btn-sm" style="width:100%;margin-bottom:0.3rem">Duplicar</button>
          <button id="btnDelete" class="tool-btn-sm" style="width:100%;color:#f85149;border-color:#f85149">Eliminar elemento</button>
        </div>
      </aside>

    </div>

    <div id="modalOverlay" class="modal-overlay" style="display:none">
      <div class="modal">
        <h2 id="modalTitle">Nuevo HUD</h2>
        <div id="modalBody"></div>
        <div class="modal-actions">
          <button id="modalCancel" class="tool-btn">Cancelar</button>
          <button id="modalOk" class="tool-btn primary">Aceptar</button>
        </div>
      </div>
    </div>

  </div>

  <script src="/devtools/editor-hud/script.js?v=2"></script>
</body>
</html>
